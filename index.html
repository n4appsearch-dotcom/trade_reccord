<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal 2569 - Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logotrade.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --emerald: #0a261a;
            --gold: #d4af37;
            --gold-l: #f9e295;
            --win: #2ecc71;
            --loss: #e74c3c;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--emerald);
            color: #fff;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
        }

        .card label {
            font-size: 0.7rem;
            color: var(--gold-l);
            display: block;
            margin-bottom: 3px;
        }

        .card b {
            font-size: 1.1rem;
        }

        .main-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #0a261a, #1a4d33);
            padding: 20px;
        }

        .profit-card {
            grid-column: span 2;
            background: rgba(46, 204, 113, 0.12);
            border-color: var(--win);
        }

        .chart-container {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(212,175,55,0.1);
            min-height: 220px;
        }

        .form-box {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.2);
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold);
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }

        input[readonly] {
            opacity: 0.85;
            cursor: not-allowed;
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: var(--emerald);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-save:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .history {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        th {
            background: rgba(212,175,55,0.15);
            padding: 8px;
            color: var(--gold);
            text-align: left;
        }

        td {
            padding: 10px 8px;
            border-top: 1px solid rgba(212,175,55,0.05);
        }

        .w { color: var(--win); font-weight: bold; }
        .l { color: var(--loss); font-weight: bold; }

        .status-box {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
        }

        .status-ok {
            display: block;
            background: rgba(46, 204, 113, 0.12);
            border: 1px solid rgba(46, 204, 113, 0.5);
            color: #b9ffd2;
        }

        .status-err {
            display: block;
            background: rgba(231, 76, 60, 0.12);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #ffd2cd;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--gold); margin: 10px 0;">📈 TRADING JOURNAL Nathakorn</h2>

    <div id="statusBox" class="status-box"></div>

    <div class="dashboard">
        <div class="card main-card">
            <label>ยอดคงเหลือปัจจุบัน</label>
            <b id="dashBal" style="font-size: 2.2rem; color: var(--gold);">0.00</b>
        </div>
        <div class="card">
            <label>กำไรสะสม</label>
            <b id="dashTtP">0.00</b>
        </div>
        <div class="card">
            <label>Win Rate</label>
            <b id="dashWR">0%</b>
        </div>
        <div class="card profit-card">
            <label>กำไรที่ยังไม่ได้ถอน (ถอนได้ทันที)</label>
            <b id="dashRemProfit" style="font-size: 1.8rem; color: var(--win);">0.00</b>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>

    <div class="form-box">
        <div class="grid">
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">วันที่</label>
                <input type="date" id="inDate">
            </div>
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">สินทรัพย์</label>
                <input type="text" id="inAsset" placeholder="เช่น FLOW">
            </div>
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">ทุนเดิม</label>
                <input type="number" id="inCap" readonly placeholder="ระบบดึงให้อัตโนมัติ">
            </div>
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">กำไร/ขาดทุน</label>
                <input type="number" id="inProfit" placeholder="ติดลบใส่ -">
            </div>
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">ลงทุนเพิ่ม</label>
                <input type="number" id="inAdd" value="0">
            </div>
            <div class="input-group">
                <label style="font-size:0.75rem; color:var(--gold-l);">ยอดถอน</label>
                <input type="number" id="inWd" value="0">
            </div>
            <div class="input-group" style="grid-column: span 2;">
                <label style="font-size:0.75rem; color:var(--gold-l);">สถานะ</label>
                <select id="inStatus">
                    <option value="W">Win ✅</option>
                    <option value="L">Loss ❌</option>
                </select>
            </div>
        </div>
        <button class="btn-save" onclick="save()">💾 บันทึกและซิงก์ข้อมูล</button>
    </div>

    <div class="history">
        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>ผลกำไร</th>
                    <th>%</th>
                    <th>ยอดคงเหลือ</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyS1XTTL1W549GHaxVUZ82DEfUDz9FYoXDYXx7ePaD63vhob3lwKuD9uZEaNnH6_MLW/exec';
    const CACHE_KEY = 'trading_journal_cache_v3';

    let records = [];
    let myChart = null;

    const statusBox = document.getElementById('statusBox');
    const inDate = document.getElementById('inDate');

    inDate.value = new Date().toISOString().split('T')[0];

    function setStatus(msg, type = 'ok') {
        statusBox.className = 'status-box ' + (type === 'err' ? 'status-err' : 'status-ok');
        statusBox.textContent = msg;
    }

    function clearStatus() {
        statusBox.className = 'status-box';
        statusBox.textContent = '';
    }

    function toNum(v) {
        const n = parseFloat(v);
        return Number.isFinite(n) ? n : 0;
    }

    function isHeaderRow(row) {
        if (Array.isArray(row)) {
            return String(row[0] || '').includes('วันที่');
        }
        if (row && typeof row === 'object') {
            const values = Object.values(row).join(' ');
            return values.includes('วันที่') || values.includes('ทุน');
        }
        return false;
    }

    function formatDateDisplay(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function normalizeDateOnly(value) {
        if (!value) return '';
        const d = new Date(value);
        if (isNaN(d.getTime())) {
            const s = String(value).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            return '';
        }
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getCurrentCapital() {
        if (!records.length) return 0;
        return toNum(records[records.length - 1].bal);
    }

    function fillCurrentCapital() {
        document.getElementById('inCap').value = getCurrentCapital();
    }

    function recordKey(r) {
        return [
            r.rawDate || '',
            r.asset || '',
            toNum(r.c).toFixed(2),
            toNum(r.p).toFixed(2),
            toNum(r.add).toFixed(2),
            toNum(r.wd).toFixed(2),
            String(r.status || '').trim().toUpperCase()
        ].join('|');
    }

    function sortRecords(list) {
        return [...list].sort((a, b) => {
            const da = new Date(a.rawDate || 0).getTime();
            const db = new Date(b.rawDate || 0).getTime();
            return da - db;
        });
    }

    function normalizeRow(row) {
        if (!row || isHeaderRow(row)) return null;

        if (Array.isArray(row)) {
            const rawDate = normalizeDateOnly(row[0]);
            if (!rawDate) return null;

            return {
                rawDate,
                c: toNum(row[1]),
                p: toNum(row[2]),
                pct: toNum(row[3]),
                add: toNum(row[4]),
                wd: toNum(row[5]),
                ttP: toNum(row[6]),
                bal: toNum(row[7]),
                asset: row[8] || '',
                sumWd: toNum(row[9]),
                status: String(row[10] || 'W').trim().toUpperCase()
            };
        }

        if (typeof row === 'object') {
            const rawDate = normalizeDateOnly(row.date || row.Date || row['วันที่']);
            if (!rawDate) return null;

            return {
                rawDate,
                c: toNum(row.c ?? row.capital ?? row['ทุน'] ?? row['B']),
                p: toNum(row.p ?? row.profit ?? row['กำไร/ขาดทุน'] ?? row['C']),
                pct: toNum(row.pct ?? row.percent ?? row['% เพิ่ม/ลด'] ?? row['D']),
                add: toNum(row.add ?? row['ลงทุนเพิ่ม'] ?? row['E']),
                wd: toNum(row.wd ?? row.withdraw ?? row['ยอดถอน'] ?? row['F']),
                ttP: toNum(row.ttP ?? row['กำไรสะสม'] ?? row['G']),
                bal: toNum(row.bal ?? row.balance ?? row['ยอดคงเหลือวันนี้'] ?? row['H']),
                asset: row.asset ?? row['สินทรัพย์'] ?? row['I'] ?? '',
                sumWd: toNum(row.sumWd ?? row['ยอดถอนสะสม'] ?? row['J']),
                status: String(row.status ?? row['สถานะ'] ?? row['K'] ?? 'W').trim().toUpperCase()
            };
        }

        return null;
    }

    function recalculateRecords(list) {
        let cumulativeProfit = 0;
        let cumulativeWithdraw = 0;

        return sortRecords(list).map(r => {
            const c = toNum(r.c);
            const p = toNum(r.p);
            const add = toNum(r.add);
            const wd = toNum(r.wd);

            cumulativeProfit += p;
            cumulativeWithdraw += wd;

            return {
                rawDate: r.rawDate,
                dateDisp: formatDateDisplay(r.rawDate),
                c,
                p,
                pct: c > 0 ? Number((p / c * 100).toFixed(2)) : 0,
                add,
                wd,
                ttP: Number(cumulativeProfit.toFixed(2)),
                bal: Number((c + p + add - wd).toFixed(2)),
                asset: r.asset || '',
                sumWd: Number(cumulativeWithdraw.toFixed(2)),
                status: String(r.status || 'W').trim().toUpperCase()
            };
        });
    }

    function mergeRecords(serverRecords, localRecords) {
        const map = new Map();
        [...localRecords, ...serverRecords].forEach(r => {
            if (r) map.set(recordKey(r), r);
        });
        return recalculateRecords([...map.values()]);
    }

    function saveCache() {
        localStorage.setItem(CACHE_KEY, JSON.stringify(records));
    }

    function loadCache() {
        try {
            const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
            if (Array.isArray(cache) && cache.length) {
                records = recalculateRecords(cache);
                renderAll();
                setStatus(`โหลดข้อมูลจากเครื่องสำเร็จ ${records.length} รายการ`);
            }
        } catch (e) {
            console.error('Load cache error:', e);
        }
    }

    async function syncFromServer() {
        try {
            setStatus('กำลังโหลดข้อมูลจาก Google Sheet...');
            const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`, { cache: 'no-store' });

            const text = await res.text();
            let data;

            try {
                data = JSON.parse(text);
            } catch (jsonErr) {
                console.error('Response text:', text);
                throw new Error('ข้อมูลที่ Apps Script ส่งกลับมาไม่ใช่ JSON');
            }

            if (!Array.isArray(data)) {
                throw new Error('ข้อมูลที่ได้ไม่ใช่ array');
            }

            const normalized = data
                .map(normalizeRow)
                .filter(Boolean);

            if (!normalized.length) {
                throw new Error('อ่านข้อมูลได้ แต่ไม่มีรายการที่ใช้ได้');
            }

            records = mergeRecords(normalized, []);
            saveCache();
            renderAll();
            setStatus(`ซิงก์สำเร็จ ${records.length} รายการ`);
        } catch (e) {
            console.error('Sync error:', e);
            setStatus('โหลดข้อมูลไม่สำเร็จ: ' + e.message, 'err');
        }
    }

    function renderAll() {
        updateUI();
        updateChart();
    }

    function updateUI() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (!records.length) {
            document.getElementById('dashBal').innerText = '0.00';
            document.getElementById('dashTtP').innerText = '0.00';
            document.getElementById('dashWR').innerText = '0%';
            document.getElementById('dashRemProfit').innerText = '0.00';
            document.getElementById('inCap').value = 0;
            return;
        }

        let wins = 0;
        let totalP = 0;
        let totalW = 0;

        records.forEach(r => {
            const isWin = String(r.status).toUpperCase().includes('W');
            if (isWin) wins++;
            totalP += toNum(r.p);
            totalW += toNum(r.wd);
        });

        const displayRecords = [...records].reverse();

        displayRecords.forEach(r => {
            const isWin = String(r.status).toUpperCase().includes('W');
            tbody.innerHTML += `
                <tr>
                    <td>${r.dateDisp}<br><small style="color:var(--gold-l)">${r.asset || '-'}</small></td>
                    <td class="${isWin ? 'w' : 'l'}">${r.p >= 0 ? '+' : ''}${toNum(r.p).toFixed(2)}</td>
                    <td>${toNum(r.pct).toFixed(2)}%</td>
                    <td style="font-weight:bold;">${toNum(r.bal).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>
                </tr>
            `;
        });

        const latest = records[records.length - 1];

        document.getElementById('dashBal').innerText =
            toNum(latest.bal).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.getElementById('dashTtP').innerText =
            totalP.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        document.getElementById('dashWR').innerText =
            ((wins / records.length) * 100).toFixed(0) + '%';

        document.getElementById('dashRemProfit').innerText =
            (totalP - totalW).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        fillCurrentCapital();
    }

    function updateChart() {
        const ctx = document.getElementById('equityChart').getContext('2d');
        const labels = records.map(r => r.dateDisp);
        const data = records.map(r => toNum(r.bal));

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'ยอดเงินคงเหลือ',
                    data,
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#f9e295', font: { size: 10 } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#f9e295', font: { size: 9 } }
                    }
                }
            }
        });
    }

    async function save() {
        const btn = document.querySelector('.btn-save');

        const payload = {
            date: document.getElementById('inDate').value,
            asset: document.getElementById('inAsset').value.trim(),
            c: getCurrentCapital(),
            p: toNum(document.getElementById('inProfit').value),
            add: toNum(document.getElementById('inAdd').value),
            wd: toNum(document.getElementById('inWd').value),
            status: document.getElementById('inStatus').value
        };

        if (!payload.date) {
            alert('กรุณาเลือกวันที่');
            return;
        }

        const optimisticRecord = {
            rawDate: payload.date,
            c: payload.c,
            p: payload.p,
            add: payload.add,
            wd: payload.wd,
            asset: payload.asset,
            status: payload.status
        };

        btn.innerText = '⌛ กำลังซิงก์...';
        btn.disabled = true;

        records = mergeRecords([], [...records, optimisticRecord]);
        saveCache();
        renderAll();

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify({
                    date: payload.date,
                    asset: payload.asset,
                    c: payload.c,
                    p: payload.p,
                    pct: payload.c > 0 ? Number((payload.p / payload.c * 100).toFixed(2)) : 0,
                    add: payload.add,
                    wd: payload.wd,
                    status: payload.status
                })
            });

            document.getElementById('inAsset').value = '';
            document.getElementById('inProfit').value = '';
            document.getElementById('inAdd').value = '0';
            document.getElementById('inWd').value = '0';
            document.getElementById('inStatus').value = 'W';

            setStatus('บันทึกลงหน้าแอปแล้ว และกำลังดึงข้อมูลจริงจากชีต...');
            setTimeout(syncFromServer, 1500);
        } catch (e) {
            console.error('Save error:', e);
            setStatus('บันทึกขึ้นหน้าแอปแล้ว แต่ซิงก์ server ไม่สำเร็จ', 'err');
        } finally {
            btn.innerText = '💾 บันทึกและซิงก์ข้อมูล';
            btn.disabled = false;
            fillCurrentCapital();
        }
    }

    async function init() {
        loadCache();
        fillCurrentCapital();
        await syncFromServer();
        fillCurrentCapital();
        setInterval(syncFromServer, 10000);
    }

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) syncFromServer();
    });

    window.onload = init;
</script>
</body>
</html>
